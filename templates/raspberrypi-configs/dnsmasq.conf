<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
	<policy user="root">
		<allow own="uk.org.thekelleys.dnsmasq"/>
		<allow send_destination="uk.org.thekelleys.dnsmasq"/>
	</policy>
        <policy user="dnsmasq">
                <allow own="uk.org.thekelleys.dnsmasq"/>
                <allow send_destination="uk.org.thekelleys.dnsmasq"/>
        </policy>
	<policy context="default">
                <deny own="uk.org.thekelleys.dnsmasq"/>
                <deny send_destination="uk.org.thekelleys.dnsmasq"/>
        </policy>
</busconfig>


#  Listen only on the local ethernet interface
interface=wlan0

# Define the pool of IP addresses handed to network clients
# Syntax: dhcp-range=start_ip,end_ip,subnet_mask,lease_duration
dhcp-range=192.168.4.10,192.168.4.200,255.255.255.0,12h

# DHCP Option 3: Instructs clients to use your router as their Default Gateway
dhcp-option=3,192.168.4.1

# DHCP Option 6: Directs clients to use this Raspberry Pi for DNS resolution
dhcp-option=6,192.168.4.1

# Optional Upstream DNS: Forward external web requests to public providers
# server=1.1.1.1
# server=8.8.8.8